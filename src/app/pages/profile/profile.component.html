<app-student-header></app-student-header>

<div class="navbar-spacer"></div>

<div class="profile-container">
  <div class="profile-header">
    <h2>{{ student.firstName }} {{ student.lastName }}</h2>
    <p>{{ student.email }}</p>
  </div>

  <div class="profile-details">
    <div class="detail-item">
      <label for="firstName">First Name</label>
      <input 
        type="text" 
        id="firstName" 
        [(ngModel)]="student.firstName" 
        placeholder="Enter your first name" 
      />
    </div>
    <div class="detail-item">
      <label for="lastName">Last Name</label>
      <input 
        type="text" 
        id="lastName" 
        [(ngModel)]="student.lastName" 
        placeholder="Enter your last name" 
      />
    </div>
    <div class="detail-item">
      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        [(ngModel)]="student.email" 
        placeholder="Enter your email address" 
      />
    </div>
    <div class="detail-item">
      <label for="password">New Password</label>
      <input 
        type="password" 
        id="password" 
        [(ngModel)]="newPassword" 
        placeholder="Enter a new password" 
      />
    </div>
    <div class="detail-item">
      <label for="confirmPassword">Confirm New Password</label>
      <input 
        type="password" 
        id="confirmPassword" 
        [(ngModel)]="confirmPassword" 
        placeholder="Re-enter your new password" 
      />
    </div>
  </div>

  <div class="profile-actions">
    <button 
      (click)="updateProfile()" 
      [disabled]="isUpdating"
      class="update-profile-btn"
    >
      <span *ngIf="!isUpdating">Update Profile</span>
      <span *ngIf="isUpdating">
        <i class="fas fa-spinner fa-spin"></i> Updating...
      </span>
    </button>
    <button 
      (click)="updatePassword()" 
      [disabled]="isUpdating || !newPassword || !confirmPassword"
      class="update-password-btn"
    >
      <span *ngIf="!isUpdating">Update Password</span>
      <span *ngIf="isUpdating">
        <i class="fas fa-spinner fa-spin"></i> Updating...
      </span>
    </button>
  </div>
</div>
