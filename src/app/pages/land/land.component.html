<div class="landing-page">
    <header class="navbar">
      <div class="logo-container">
        <img src="logo3.png" alt="HOGOZATY Logo" class="logo-image">
      </div>
  
      <!-- Language Toggle Button -->
      <div class="language-toggle">
        <button (click)="changeLang('en')">EN</button>
        <button (click)="changeLang('ar')">AR</button>
      </div>
  
      <!-- Right Buttons -->
      <div class="right-button">
        <button routerLink="/login">{{ 'landing.login' | transloco }}</button>
        <button routerLink="/registerStudent">{{ 'landing.register' | transloco }}</button>
      </div>
    </header>
  
    <div class="cover-image">
      <img src="bg-masthead.jpg" alt="Cover Image" class="full-cover" />
      <div class="hero-text">
        <h1>{{ 'landing.title' | transloco }}</h1>
        <p>{{ 'landing.subtitle' | transloco }}</p>
        <button routerLink="/info">{{ 'landing.ctaButton' | transloco }}</button>
      </div>
    </div>
  </div>
